<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Portafolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/521786edcf.js" crossorigin="anonymous"></script>
</head>
<body class="with-bg">
    <header>
        <nav id="navbar">
            <div class="logo">A<span>T</span></div>
                <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="about.html">Inteligencia Artificial</a></li>
                <li><a href="skills.html">Conceptos de la IA</a></li>
                <li><a href="contact.html">Contactame Aqui</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="Contacto" class="contact">
            <div class="contact-container">
                <h2 class="seccion-tittle">Ponte en Contacto</h2>
                
                <form>
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>

                    <div class="form-group">
                        <label for="asunto">Asunto</label>
                        <input type="text" id="asunto" name="asunto" required placeholder="¿Sobre qué quieres hablar?">
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" name="mensaje" required placeholder="Tu mensaje aquí..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Enviar Mensaje</button>
                </form>

                <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
                    <p style="margin-bottom: 1rem; color: var(--gray-text);">O también puedes contactarme por:</p>
                    <div class="social-links" style="justify-content: center;">
                        <a href="#" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                        <a href="https://www.instagram.com/aaalan.tt/" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
                        <a href="https://wa.me/98123905" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
